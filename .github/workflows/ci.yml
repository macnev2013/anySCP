name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `pnpm build` runs `tsc` (strict typecheck) then `vite build` (bundle).
      - name: Typecheck and build
        run: pnpm build

  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # tauri-build (build.rs) reads `frontendDist: "../dist"`, so the bundle
      # must exist before any cargo command compiles the crate.
      - name: Build frontend (provides dist for tauri-build)
        run: pnpm build

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        working-directory: src-tauri
        run: cargo test

  e2e:
    name: E2E shard ${{ matrix.shard }}/4
    runs-on: ubuntu-latest
    # Runs in parallel with the frontend/rust jobs (no `needs`) for faster
    # feedback. `make e2e` rebuilds the frontend + Tauri binary inside Docker,
    # so the E2E job has no data dependency on those jobs — only the wall-clock
    # win of not waiting for them.
    timeout-minutes: 60
    strategy:
      # Don't cancel the other shards when one fails — we want the full picture.
      fail-fast: false
      matrix:
        # Specs are split round-robin across these shards (see wdio.conf.ts).
        # SHARD_TOTAL below must equal the number of entries here.
        shard: [1, 2, 3, 4]
    env:
      SHARD_INDEX: ${{ matrix.shard }}
      SHARD_TOTAL: 4
    steps:
      - uses: actions/checkout@v4

      # Brings up the SSH/SCP/MinIO target containers, builds the runner image,
      # compiles the Tauri debug binary in-container, then runs this shard's
      # slice of the WDIO suite.
      - name: Run E2E suite (shard ${{ matrix.shard }}/4)
        run: make e2e
