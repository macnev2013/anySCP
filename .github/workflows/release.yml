name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
            label: macOS (Apple Silicon)
          - platform: macos-13
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
            label: macOS (Intel)
          - platform: ubuntu-22.04
            args: ""
            rust_target: ""
            label: Linux
          - platform: windows-latest
            args: ""
            rust_target: ""
            label: Windows

    runs-on: ${{ matrix.platform }}
    name: Build — ${{ matrix.label }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            javascriptcoregtk-4.1-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "AnySCP ${{ github.ref_name }}"
          releaseBody: ""
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          updaterJsonKeepUniversal: true

  update-release-notes:
    needs: build
    runs-on: ubuntu-latest
    name: Generate release notes

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          CURRENT_TAG=${{ github.ref_name }}

          if [ "$PREV_TAG" = "$CURRENT_TAG" ] || [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s" "${PREV_TAG}..${CURRENT_TAG}")
          fi

          cat <<BODY > release_notes.md
          ## What's New

          ${COMMITS}

          ## Downloads

          | Platform | File |
          |----------|------|
          | macOS (Apple Silicon) | \`.dmg\` (aarch64) |
          | macOS (Intel) | \`.dmg\` (x64) |
          | Windows | \`.msi\` / \`.exe\` |
          | Linux | \`.deb\` / \`.AppImage\` |

          ## Installation

          Download the appropriate file for your platform from the assets below.

          macOS users: If you see "app is damaged", run:
          \`\`\`bash
          xattr -cr /Applications/anyscp.app
          \`\`\`

          ## Auto-Updates

          Already have AnySCP installed? Go to **Settings > Updates** and click **Check** to update in-app.
          BODY

      - name: Update release body
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit ${{ github.ref_name }} \
            --notes-file release_notes.md
